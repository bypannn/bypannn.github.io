<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Pannn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">pannn.studio</a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="work.html" style="color:var(--fg)">Work</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </nav>

  <section style="padding-top:8rem">
    <p class="section-label">All Work</p>
    <div class="work-grid" id="work-grid"></div>
  </section>

  <footer><span id="footer-name"></span> · Built with care</footer>

  <script>
    fetch('content.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('footer-name').textContent = '© 2024 ' + data.name;
        const workGrid = document.getElementById('work-grid');
        data.works.forEach(w => {
          workGrid.innerHTML += `
            <a href="work/${w.id}.html" class="work-card">
              <p class="work-card-tag">${w.tag}</p>
              <h3>${w.title}</h3>
              <p>${w.desc}</p>
              <div class="work-card-footer">
                <span class="work-card-meta">${w.meta}</span>
                <span class="arrow">↗</span>
              </div>
            </a>`;
        });
      });
  </script>
</body>
</html>
